server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Pas de cache sur index.html pour que chaque déploiement soit pris en compte
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers avec hash (ex. main.eaf4225277726a91.js) : cache long OK
    location ~* \.[a-f0-9]+\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy API vers le backend (même origine pour le front → pas de CORS)
    location /api/ {
        proxy_pass http://backend:8888/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Device-Id $http_x_device_id;
        proxy_set_header X-Owner-Token $http_x_owner_token;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
